name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & publish (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun run tauri build

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p release
          cp src-tauri/target/release/bundle/nsis/*.exe release/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi release/ 2>/dev/null || true
          ls -la release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.msi
          body: |
            ## RL Stats Overlay ${{ github.ref_name }}

            **⚠️ Windows SmartScreen** : ce binaire n'est pas signé. Au premier lancement,
            Windows affichera un avertissement. Clique sur **Plus d'infos** puis sur
            **Exécuter quand même** — c'est normal pour un projet open-source non signé.

            ### Installation

            1. Télécharge `RLStatsOverlay-Setup-...-x64-setup.exe` ci-dessous
            2. Double-clique pour lancer l'installation
            3. Au premier lancement, le wizard détecte Rocket League et configure tout
            4. Joue, l'overlay se met à jour en direct
