name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & publish (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      # tauri-action runs `tauri build`, signs the artifacts (if signing
      # secrets are set), creates the GitHub release, uploads the .exe / .msi,
      # and — with includeUpdaterJson: true — also publishes a `latest.json`
      # manifest the in-app updater consumes.
      #
      # The signing secrets are optional: until they are configured in the
      # repo's GitHub Actions secrets, the build still succeeds but the
      # updater client will refuse to install unsigned updates. See README
      # for the keypair generation steps.
      - name: Build & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "RL Stats Overlay v__VERSION__"
          releaseDraft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
          includeUpdaterJson: true
          releaseBody: |
            ## RL Stats Overlay ${{ github.ref_name }}

            **⚠️ Windows SmartScreen** : ce binaire n'est pas signé. Au premier lancement,
            Windows affichera un avertissement. Clique sur **Plus d'infos** puis sur
            **Exécuter quand même** — c'est normal pour un projet open-source non signé.

            ### Installation

            1. Télécharge `RLStatsOverlay-Setup-...-x64-setup.exe` ci-dessous
            2. Double-clique pour lancer l'installation
            3. Au premier lancement, le wizard détecte Rocket League et configure tout
            4. Joue, l'overlay se met à jour en direct
