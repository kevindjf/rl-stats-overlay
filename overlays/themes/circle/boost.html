<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>RL Boost Overlay</title>
  <link rel="stylesheet" href="./boost.css" />
</head>
<body>
  <!--
    ┌──────────────────────────── GEOMETRY ────────────────────────────┐
    │                                                                  │
    │   The 3 cards stack vertically to the LEFT of RL's circular      │
    │   boost gauge. Their right edges are 3 segments of ONE shared    │
    │   circle of radius R, centred OFF-CANVAS to the right at         │
    │   (Cx, Cy) where Cy = panel_height / 2.                          │
    │                                                                  │
    │       panel ┃ ←─ x(y) for each y, on a single circle ─→      ●   │
    │     ┌───────┸──╮                                          (Cx,Cy)│
    │     │  STRK ╱  │ top    ← bites the upper third of the arc │    │
    │     ├──────╱───┤                                            │    │
    │     │ WINS │   │ mid    ← deepest concavity here            │ R  │
    │     ├──────╲───┤                                            │    │
    │     │  LOSS ╲  │ bot    ← bites the lower third             │    │
    │     └────────╲─┘                                            │    │
    │                                                                  │
    │   x(y) = Cx − √(R² − (y − Cy)²)                                  │
    │                                                                  │
    │   Defaults (W=400, card_h=80, gap=12 → panel_h=264):              │
    │     R  = 320   (--gauge-radius)                                  │
    │     Cy = 132   (panel_h / 2)                                     │
    │     Cx = 590   (deepest_x + R, with deepest_x = 270)             │
    │                                                                  │
    │   Tuning for a different in-game HUD scale (e.g. 4K, scaled-     │
    │   down boost gauge): bump --gauge-radius UP for a flatter, less  │
    │   pronounced curve (large gauge), or DOWN for a tighter wrap     │
    │   around a smaller gauge. R must stay > panel_h/2 = 132 or the   │
    │   square-root goes imaginary at the corners.                     │
    │                                                                  │
    │   Each card's <path> hard-codes the 6 anchor x values that       │
    │   correspond to R=320. If you change --gauge-radius you must     │
    │   recompute them with the formula above (or generate them from   │
    │   the CSS var via build-step / inline SVG <path d=...>). Kept    │
    │   static here to stay 100 % pure SVG + CSS, no JS.               │
    └──────────────────────────────────────────────────────────────────┘
  -->
  <div class="panel" role="img" aria-label="Session stats panel">
    <span class="conn-dot" id="conn" title="Stats API connection"></span>

    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <!-- Subtle separation shadow only — no longer needed for text contrast
             (the panel fill is opaque and dark enough on its own), kept just
             so the card silhouette doesn't blend into very dark stream
             backgrounds. -->
        <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="115%">
          <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
        </filter>

        <!-- Lucide-style line icons (MIT, https://lucide.dev). Sized at the
             icon container; stroke uses currentColor so each card colours
             its icon to match the value below it. -->
        <symbol id="ico-flame" viewBox="0 0 24 24"
                fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
        </symbol>
        <symbol id="ico-trophy" viewBox="0 0 24 24"
                fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
          <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
          <path d="M4 22h16"/>
          <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
          <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
          <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
        </symbol>
        <symbol id="ico-x" viewBox="0 0 24 24"
                fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18"/>
          <path d="m6 6 12 12"/>
        </symbol>
      </defs>
    </svg>

    <!--
      Anchor x-values for R=320, Cy=132, deepest_x=270, panel x∈[0,400]:
        top : y_global   0 → x=298.41 ;  y_global  80 → x=274.25
        mid : y_global  92 → x=272.51 ;  y_global 172 → x=272.51 (creux à 270, y=132)
        bot : y_global 184 → x=274.25 ;  y_global 264 → x=298.41
      sweep-flag = 0 → arc concave (courbure vers le centre du cercle, à droite).
      The shared shape across the 3 paths is one continuous circle.
    -->
    <div class="card top">
      <svg class="bg" viewBox="0 0 400 80" preserveAspectRatio="none">
        <path d="M 0,0 L 298.41,0 A 320 320 0 0 0 274.25,80 L 0,80 Z"
              style="fill: var(--color-card); stroke: var(--color-card-stroke)"
              stroke-width="1" filter="url(#cardShadow)"/>
      </svg>
      <div class="label streak-label">
        <svg class="icon" viewBox="0 0 24 24"><use href="#ico-flame"/></svg>
        <span class="text">STRK</span>
      </div>
      <div class="value" id="v-streak">+0</div>
    </div>

    <div class="card mid">
      <svg class="bg" viewBox="0 0 400 80" preserveAspectRatio="none">
        <path d="M 0,0 L 272.51,0 A 320 320 0 0 0 272.51,80 L 0,80 Z"
              style="fill: var(--color-card); stroke: var(--color-card-stroke)"
              stroke-width="1" filter="url(#cardShadow)"/>
      </svg>
      <div class="label win-label">
        <svg class="icon" viewBox="0 0 24 24"><use href="#ico-trophy"/></svg>
        <span class="text">WINS</span>
      </div>
      <div class="value win" id="v-wins">0</div>
    </div>

    <div class="card bot">
      <svg class="bg" viewBox="0 0 400 80" preserveAspectRatio="none">
        <path d="M 0,0 L 274.25,0 A 320 320 0 0 0 298.41,80 L 0,80 Z"
              style="fill: var(--color-card); stroke: var(--color-card-stroke)"
              stroke-width="1" filter="url(#cardShadow)"/>
      </svg>
      <div class="label loss-label">
        <svg class="icon" viewBox="0 0 24 24"><use href="#ico-x"/></svg>
        <span class="text">LOSS</span>
      </div>
      <div class="value loss" id="v-losses">0</div>
    </div>
  </div>

  <script type="module" src="./boost.js"></script>
</body>
</html>
